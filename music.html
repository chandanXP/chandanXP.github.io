<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saroj | Music Official</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background-color: #121212; color: #ffffff; }
        
        /* The Hero Section will use your raw studio photo */
        .hero { 
            text-align: center; 
            padding: 80px 20px; 
            /* Assuming you upload your studio pic to the assets folder */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('assets/img/Sawwal-Hee-Nahi.jpg') center/cover; 
        } 
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        .section { padding: 50px 20px; max-width: 900px; margin: 0 auto; border-bottom: 1px solid #333; }
        .stats { display: flex; justify-content: space-around; background: #1e1e1e; padding: 20px; border-radius: 8px; text-align: center; }
        .stats h3 { color: #b3b3b3; font-size: 0.9rem; text-transform: uppercase; }
        .stats p { font-size: 2rem; font-weight: bold; margin: 10px 0 0 0; color: #1DB954; }
        
        .btn { display: inline-block; padding: 12px 30px; background: #1DB954; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        
        a { color: #1DB954; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Saroj</h1>
        <p>Delhi • DHH • No Mediocrity</p>
        <a href="https://open.spotify.com/artist/0c9CWqibYvLSGpWfbSGKnv" target="_blank" class="btn">Follow on Spotify</a>
    </div>

    <div class="section">
        <div class="stats">
            <div>
                <h3>Spotify Followers</h3>
                <p id="follower-count">--</p> 
            </div>
            <div>
                <h3>Monthly Listeners</h3>
                <p id="listener-count">--</p>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>Latest Release: Sawwal Hee Nahi</h2>
        <p style="color: #b3b3b3;">Dropping March 31, 2026</p>
        
        <div style="background: #282828; padding: 60px 20px; text-align: center; border-radius: 8px; margin-top: 20px;">
            <p>Spotify Player unlocks at midnight.</p>
        </div>
    </div>

    <div class="section grid">
        <div>
            <h2>Upcoming Shows</h2>
            <p style="color: #b3b3b3;">Currently locked in the studio. Dates TBA.</p>
        </div>
        <div>
            <h2>Connect</h2>
            <p><a href="https://www.instagram.com/_chandan_saroj" target="_blank">Instagram</a></p>
            <p><a href="https://open.spotify.com/artist/0c9CWqibYvLSGpWfbSGKnv" target="_blank">Spotify Profile</a></p>
        </div>
    </div>
</body>
</html>
